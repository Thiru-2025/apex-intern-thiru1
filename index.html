<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internship Confirmation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      background: #ffffff;
      max-width: 700px;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      line-height: 1.8;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      color: #1f4e79;
    }

    p {
      font-size: 18px;
      margin: 10px 0;
    }

    .highlight {
      font-weight: bold;
      color: #0d5c8a;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Internship Confirmation</h1>
    <p>This is to confirm that the internship was completed by <span class="highlight">(Intern Name)</span>.</p>
    <p>The internship period was from <span class="highlight">(Start Date)</span> to <span class="highlight">(End Date)</span>.</p>
    <p>It was completed under the guidance of <span class="highlight">(Company Name)</span>.</p>
  </div>
</body>
</html>
